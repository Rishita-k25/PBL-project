<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Browse 500+ internships and jobs in India. Filter by location, salary, and job type on InternHub." />
    <title>Browse Jobs — InternHub</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>

<body>
    <div id="navbar-placeholder"></div>

    <!-- Page Header -->
    <header class="page-header" role="banner">
        <div class="container">
            <h1>💼 Browse Jobs & Internships</h1>
            <p>Discover <strong>22+</strong> curated opportunities from top companies. Find one that fits you!</p>
        </div>
    </header>

    <main class="section" role="main" style="padding-top:0">
        <div class="container">

            <!-- Search Row -->
            <div class="search-row" role="search" aria-label="Job search">
                <div class="search-bar" style="flex:1">
                    <span class="search-icon" aria-hidden="true">🔍</span>
                    <input type="search" id="searchInput" placeholder="Search jobs, companies, skills..."
                        aria-label="Search jobs by title, company, or skill" autocomplete="off" />
                </div>
                <select class="form-select" id="sortSelect" aria-label="Sort jobs by"
                    style="width:auto;min-width:160px">
                    <option value="newest">📅 Newest First</option>
                    <option value="oldest">📅 Oldest First</option>
                    <option value="salary_hi">💰 Highest Salary</option>
                    <option value="salary_lo">💰 Lowest Salary</option>
                </select>
            </div>

            <!-- Layout: Sidebar + Cards -->
            <div class="jobs-layout">

                <!-- ── Filter Sidebar ── -->
                <aside class="filter-sidebar" aria-label="Job filters">
                    <h3>
                        <span>🎛️ Filters</span>
                        <button id="clearFilters" class="btn btn-ghost btn-sm" aria-label="Clear all filters"
                            title="Clear all filters">Reset</button>
                    </h3>

                    <div class="filter-group">
                        <label for="filterType">Job Type</label>
                        <select class="form-select" id="filterType" aria-label="Filter by job type">
                            <option value="">All Types</option>
                            <option value="Internship">Internship</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="filterLocation">Location</label>
                        <select class="form-select" id="filterLocation" aria-label="Filter by location">
                            <option value="">All Locations</option>
                            <!-- Populated dynamically by jobs.js -->
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="filterSalary">Monthly Stipend</label>
                        <select class="form-select" id="filterSalary" aria-label="Filter by salary range">
                            <option value="">Any Salary</option>
                            <option value="0-10000">Under ₹10,000</option>
                            <option value="10000-15000">₹10,000 – ₹15,000</option>
                            <option value="15000-25000">₹15,000 – ₹25,000</option>
                            <option value="25000-999999">Above ₹25,000</option>
                        </select>
                    </div>

                    <!-- Quick links -->
                    <div
                        style="border-top:1px solid var(--border);padding-top:var(--space-md);margin-top:var(--space-md)">
                        <p
                            style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.5px;font-weight:600">
                            Quick Filters</p>
                        <div style="display:flex;flex-direction:column;gap:.3rem">
                            <button class="btn btn-ghost btn-sm" onclick="quickFilter('Remote')"
                                aria-label="Show remote jobs">🌍 Remote Only</button>
                            <button class="btn btn-ghost btn-sm" onclick="quickFilter('Internship')"
                                aria-label="Show internships only">🎓 Internships Only</button>
                            <button class="btn btn-ghost btn-sm" onclick="quickFilter('Full-time')"
                                aria-label="Show full-time jobs">💼 Full-time Only</button>
                        </div>
                    </div>

                    <!-- Saved jobs link -->
                    <div
                        style="border-top:1px solid var(--border);padding-top:var(--space-md);margin-top:var(--space-md)">
                        <p style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:.5rem">Manage</p>
                        <a href="tracker.html" class="btn btn-outline btn-sm btn-full"
                            aria-label="View my applications">📊 My Applications</a>
                    </div>
                </aside>

                <!-- ── Jobs Grid ── -->
                <section aria-live="polite" aria-label="Job listings">
                    <div class="jobs-header">
                        <span class="jobs-count" id="jobsCount" aria-live="polite">Loading...</span>
                    </div>
                    <div class="jobs-grid" id="jobsGrid" role="list">
                        <!-- Cards rendered by jobs.js -->
                    </div>
                </section>
            </div><!-- /jobs-layout -->

        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;padding-top:0">
                <span>© 2026 InternHub. All rights reserved.</span>
                <span>
                    <a href="../index.html" style="color:var(--text-muted)">Home</a> ·
                    <a href="tracker.html" style="color:var(--text-muted)">Tracker</a> ·
                    <a href="resume.html" style="color:var(--text-muted)">Resume</a>
                </span>
            </div>
        </div>
    </footer>

    <script src="../js/storage.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/jobs.js"></script>
    <script>
        function quickFilter(value) {
            const typeEl = document.getElementById('filterType');
            const locEl = document.getElementById('filterLocation');
            if (value === 'Remote') {
                if (locEl) locEl.value = 'Remote';
                if (typeEl) typeEl.value = '';
            } else {
                if (typeEl) typeEl.value = value;
                if (locEl) locEl.value = '';
            }
            // Trigger both change events
            typeEl?.dispatchEvent(new Event('change'));
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Login or create a free InternHub account to apply for internships and track your applications." />
    <title>Login / Register — InternHub</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="auth-page" role="main">
        <div class="auth-card" role="region" aria-label="Authentication">

            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon-big" aria-hidden="true">🎯</div>
                <h1>Welcome to InternHub</h1>
                <p>India's #1 student career platform</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs" role="tablist" aria-label="Login or Register">
                <button class="tab-btn active" data-tab="login" role="tab" aria-selected="true" id="loginTab"
                    aria-controls="loginForm">Login</button>
                <button class="tab-btn" data-tab="register" role="tab" aria-selected="false" id="registerTab"
                    aria-controls="registerForm">Register</button>
            </div>

            <!-- ── LOGIN FORM ── -->
            <form class="auth-form active" id="loginForm" role="tabpanel" aria-labelledby="loginTab" novalidate>
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">📧</span>
                        <input class="form-input" type="email" id="loginEmail" name="email"
                            placeholder="you@example.com" autocomplete="email" aria-required="true"
                            aria-describedby="loginEmailError" />
                    </div>
                    <span class="form-error" id="loginEmailError" role="alert"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <span class="input-icon" aria-hidden="true">🔒</span>
                        <input class="form-input" type="password" id="loginPassword" name="password"
                            placeholder="Enter your password" autocomplete="current-password" aria-required="true"
                            aria-describedby="loginPasswordError" style="padding-left:2.6rem" />
                        <button type="button" class="toggle-password"
                            aria-label="Toggle password visibility">👁️</button>
                    </div>
                    <span class="form-error" id="loginPasswordError" role="alert"></span>
                </div>

                <div class="forgot-link">
                    <a href="#" onclick="alert('Password reset link sent to your email! (Demo)'); return false;">Forgot
                        password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg">
                    🔑 Login to InternHub
                </button>

                <p style="text-align:center;margin-top:var(--space-md);font-size:var(--fs-sm);color:var(--text-muted)">
                    Don't have an account?
                    <a href="#" onclick="document.querySelector('[data-tab=register]').click();return false;"
                        style="color:var(--primary-light)">Register free</a>
                </p>

                <!-- Demo hint -->
                <p
                    style="text-align:center;margin-top:var(--space-sm);font-size:var(--fs-xs);color:var(--text-muted);background:rgba(79,70,229,.08);padding:.5rem;border-radius:var(--radius-sm);border:1px dashed var(--border)">
                    💡 <strong>Demo:</strong> Register first, then login with those credentials.
                </p>
            </form>

            <!-- ── REGISTER FORM ── -->
            <form class="auth-form" id="registerForm" role="tabpanel" aria-labelledby="registerTab" novalidate>
                <div class="form-group">
                    <label class="form-label" for="regName">Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">👤</span>
                        <input class="form-input" type="text" id="regName" name="name" placeholder="Priya Sharma"
                            autocomplete="name" aria-required="true" aria-describedby="regNameError" />
                    </div>
                    <span class="form-error" id="regNameError" role="alert"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regEmail">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">📧</span>
                        <input class="form-input" type="email" id="regEmail" name="email" placeholder="you@example.com"
                            autocomplete="email" aria-required="true" aria-describedby="regEmailError" />
                    </div>
                    <span class="form-error" id="regEmailError" role="alert"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regPassword">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <span class="input-icon" aria-hidden="true">🔒</span>
                        <input class="form-input" type="password" id="regPassword" name="password"
                            placeholder="Minimum 6 characters" autocomplete="new-password" aria-required="true"
                            aria-describedby="regPasswordError" style="padding-left:2.6rem" />
                        <button type="button" class="toggle-password"
                            aria-label="Toggle password visibility">👁️</button>
                    </div>
                    <span class="form-error" id="regPasswordError" role="alert"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regConfirm">Confirm Password</label>
                    <div class="input-wrapper password-wrapper">
                        <span class="input-icon" aria-hidden="true">🔐</span>
                        <input class="form-input" type="password" id="regConfirm" name="confirm"
                            placeholder="Repeat your password" autocomplete="new-password" aria-required="true"
                            aria-describedby="regConfirmError" style="padding-left:2.6rem" />
                        <button type="button" class="toggle-password"
                            aria-label="Toggle confirm password visibility">👁️</button>
                    </div>
                    <span class="form-error" id="regConfirmError" role="alert"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg">
                    🚀 Create Free Account
                </button>

                <p style="text-align:center;margin-top:var(--space-md);font-size:var(--fs-sm);color:var(--text-muted)">
                    Already have an account?
                    <a href="#" onclick="document.querySelector('[data-tab=login]').click();return false;"
                        style="color:var(--primary-light)">Login here</a>
                </p>
            </form>

        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>

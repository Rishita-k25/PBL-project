<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View complete job details, requirements, skills, and apply on InternHub." />
    <title>Job Details — InternHub</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="section" role="main">
        <div class="container">

            <!-- Back button -->
            <a href="jobs.html" class="btn btn-ghost btn-sm" style="margin-bottom:var(--space-lg);display:inline-flex"
                aria-label="Back to job listings">
                ← Back to Jobs
            </a>

            <!-- Content injected by JS -->
            <div id="jobDetailsRoot">
                <div style="text-align:center;padding:4rem;color:var(--text-muted)">
                    <div style="font-size:2rem;margin-bottom:1rem">⏳</div>
                    <p>Loading job details...</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;padding-top:0">
                <span>© 2026 InternHub. All rights reserved.</span>
                <span>
                    <a href="jobs.html" style="color:var(--text-muted)">Browse Jobs</a> ·
                    <a href="tracker.html" style="color:var(--text-muted)">My Applications</a>
                </span>
            </div>
        </div>
    </footer>

    <script src="../js/storage.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const jobId = Number(params.get('id'));
            const job = JOBS.find(j => j.id === jobId);
            const root = document.getElementById('jobDetailsRoot');

            if (!job) {
                root.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">😕</div>
            <h3>Job Not Found</h3>
            <p>This job listing may have been removed or the link is incorrect.</p>
            <a href="jobs.html" class="btn btn-primary" style="margin-top:1rem">Browse All Jobs</a>
          </div>`;
                return;
            }

            // Update page title
            document.title = `${job.title} at ${job.company} — InternHub`;

            const saved = isJobSaved(job.id);
            const applied = hasApplied(job.id);

            root.innerHTML = `
        <div class="job-details-layout">

          <!-- ── Main Content ── -->
          <div>
            <!-- Header -->
            <div class="card" style="margin-bottom:var(--space-xl)">
              <div class="jd-header">
                <div class="jd-logo" aria-hidden="true">${job.emoji}</div>
                <div>
                  <h1 class="jd-title">${job.title}</h1>
                  <div class="jd-company">${job.company}</div>
                  <div class="jd-meta-row">
                    <span class="jd-meta-item">📍 ${job.location}</span>
                    <span class="jd-meta-item">📅 Posted ${formatDate(job.posted)}</span>
                    <span class="badge badge-type">${job.type}</span>
                  </div>
                </div>
              </div>

              <!-- CTA buttons in header for mobile -->
              <div style="display:flex;gap:.75rem;flex-wrap:wrap">
                <button id="applyBtn" class="btn ${applied ? 'btn-ghost' : 'btn-primary'} btn-lg" ${applied ? 'disabled aria-disabled="true"' : ''} aria-label="${applied ? 'Already applied' : 'Apply for ' + job.title}">
                  ${applied ? '✅ Already Applied' : '🚀 Apply Now'}
                </button>
                <button id="saveBtn" class="btn btn-outline ${saved ? 'saved' : ''}" aria-label="${saved ? 'Remove from saved jobs' : 'Save this job'}">
                  ${saved ? '⭐ Saved' : '☆ Save Job'}
                </button>
              </div>
            </div>

            <!-- Description -->
            <div class="card jd-section" style="margin-bottom:var(--space-lg)">
              <h2>📖 About This Role</h2>
              <p>${job.description}</p>
            </div>

            <!-- Responsibilities -->
            <div class="card jd-section" style="margin-bottom:var(--space-lg)">
              <h2>🎯 Responsibilities</h2>
              <ul>
                ${job.responsibilities.map(r => `<li>${r}</li>`).join('')}
              </ul>
            </div>

            <!-- Requirements -->
            <div class="card jd-section" style="margin-bottom:var(--space-lg)">
              <h2>✅ Requirements</h2>
              <ul>
                ${job.requirements.map(r => `<li>${r}</li>`).join('')}
              </ul>
            </div>

            <!-- Skills -->
            <div class="card jd-section">
              <h2>🛠️ Skills Required</h2>
              <div class="skills-grid" role="list" aria-label="Required skills">
                ${job.skills.map(s => `<span class="skill-chip" role="listitem">${s}</span>`).join('')}
              </div>
            </div>
          </div>

          <!-- ── Sidebar ── -->
          <aside>
            <div class="jd-sidebar-card">
              <h3>📊 Job Overview</h3>
              <div class="jd-info-row">
                <span class="jd-info-label">💰 Salary</span>
                <span class="jd-info-value" style="color:var(--success);font-weight:700">${job.salary}</span>
              </div>
              <div class="jd-info-row">
                <span class="jd-info-label">📋 Type</span>
                <span class="jd-info-value"><span class="badge badge-type">${job.type}</span></span>
              </div>
              <div class="jd-info-row">
                <span class="jd-info-label">📍 Location</span>
                <span class="jd-info-value">${job.location}</span>
              </div>
              <div class="jd-info-row">
                <span class="jd-info-label">🏢 Company</span>
                <span class="jd-info-value">${job.company}</span>
              </div>
              <div class="jd-info-row">
                <span class="jd-info-label">🏷️ Category</span>
                <span class="jd-info-value">${job.category}</span>
              </div>
              <div class="jd-info-row">
                <span class="jd-info-label">📅 Posted</span>
                <span class="jd-info-value">${formatDate(job.posted)}</span>
              </div>

              <div style="margin-top:var(--space-lg);display:flex;flex-direction:column;gap:.6rem">
                <button id="applySideBtn" class="btn ${applied ? 'btn-ghost' : 'btn-primary'} btn-full" ${applied ? 'disabled aria-disabled="true"' : ''}>
                  ${applied ? '✅ Already Applied' : '🚀 Apply Now'}
                </button>
                <a href="jobs.html" class="btn btn-outline btn-full">← More Jobs</a>
              </div>
            </div>

            <!-- Similar tags -->
            <div class="jd-sidebar-card" style="margin-top:var(--space-lg)">
              <h3>🔗 Related Skills</h3>
              <div class="skills-grid" style="margin-top:.5rem">
                ${job.skills.slice(0, 4).map(s => `<span class="skill-chip">${s}</span>`).join('')}
              </div>
            </div>
          </aside>

        </div>`;

            // Apply button logic (both main and sidebar)
            function handleApply() {
                if (applied) return;
                const added = addApplication(job);
                if (added) {
                    showToast(`Successfully applied to ${job.title}! 🎉`, 'success', '✅');
                    setTimeout(() => { window.location.href = 'tracker.html'; }, 1200);
                }
            }

            document.getElementById('applyBtn')?.addEventListener('click', handleApply);
            document.getElementById('applySideBtn')?.addEventListener('click', handleApply);

            // Save button
            let isSaved = saved;
            document.getElementById('saveBtn')?.addEventListener('click', function () {
                isSaved = toggleSaveJob(job.id);
                this.textContent = isSaved ? '⭐ Saved' : '☆ Save Job';
                this.classList.toggle('saved', isSaved);
                this.setAttribute('aria-label', isSaved ? 'Remove from saved jobs' : 'Save this job');
                showToast(isSaved ? `${job.title} saved! ⭐` : 'Job removed from saved.', isSaved ? 'success' : '', isSaved ? '⭐' : '🗑️');
            });
        });

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
        }
    </script>
</body>

</html>
